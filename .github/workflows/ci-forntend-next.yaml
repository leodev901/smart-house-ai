name: frontend-next > ci and push GHCR

on:
  push:
    branches: ["main"]
    paths:
      - 'frontend-next/**'
      - '.github/workflows/ci-forntend-next.yaml'
  workflow_dispatch:

permissions:
  contents: write
  packages: write

jobs:
  build:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and Push
        uses: docker/build-push-action@v6
        with:
          context: ./frontend-next
          push: true
          tags: |
            ghcr.io/${{ github.repository }}/frontend-next:${{ github.sha }}
            ghcr.io/${{ github.repository }}/frontend-next:latest
